<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプルBBS</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 0 10px; }
        .post { border-bottom: 1px solid #ccc; padding: 10px 0; }
        .time { color: #666; font-size: 0.8em; }
    </style>
</head>
<body>
    <h1>Node.js 掲示板</h1>
    
    <form action="/post" method="POST">
        <input type="text" name="name" placeholder="名前" required><br><br>
        <textarea name="message" placeholder="本文" rows="4" cols="40" required></textarea><br><br>
        <button type="submit">書き込む</button>
    </form>

    <h2>投稿一覧</h2>
    <div id="posts"></div>

    <script>
        // サーバーから投稿を取得して表示
        async function loadPosts() {
            const res = await fetch('/api/posts');
            const posts = await res.json();
            const container = document.getElementById('posts');
            container.innerHTML = posts.map(p => `
                <div class="post">
                    <strong>${p.name}</strong> <span class="time">${p.time}</span>
                    <p>${p.message}</p>
                </div>
            `).join('');
        }
        loadPosts();
    </script>
</body>
</html>
