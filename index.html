<!DOCTYPE html>
<html>
<head>
		<meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
		<link rel="stylesheet" href="styles/style.css"/>
		<title>bbstest</title>
</head>
<body>
		<h1>foom bbs</h1>
		<a href="https://google.com">フォームサイトを埋め込む場合はコチラ</a>
		
		<!-- フォームタグ（id="bbsForm"）で入力欄とボタンを囲みます -->
		<form id="bbsForm" style="margin-bottom: 20px;">
				<!-- 投稿入力エリア -->
				<textarea style="width:100%; height:500px;" id="text" placeholder='<iframe src="フォームurl"></iframe>'></textarea><br><br>
				
				<!-- ボタンのタイプを submit （送信）に変更 -->
				<button type="submit" style="font-size:30px;">読み取り・投稿テスト</button>
		</form>
		
		<!-- 投稿されたコード（iframe群）が表示されるグレーの枠線エリア -->
		<div style="
		  width: 100%;
		  height: 500px;
		  background-color: #f0f0f0;
		  border: 4px solid #333333;
		  box-sizing: border-box;
		  overflow-y: auto;
		" id="html">
		</div>

		<script>
				// 1. サーバーからこれまでの投稿を取得して枠内に表示する関数
				async function loadPosts() {
						const res = await fetch('/api/posts');
						const posts = await res.json();
						
						document.getElementById('html').innerHTML = posts.map(p => `
								<div style="border-bottom: 2px dashed #333; padding: 15px; background: #fff; margin-bottom: 10px;">
										<p style="margin:0 0 5px 0; font-size:12px; color:#666;">投稿日時: ${p.time}</p>
										<div>${p.message}</div>
								</div>
						`).join('');
				}

				// 2. フォームの submit イベントをキャッチして処理を行う
				document.getElementById('bbsForm').addEventListener('submit', async function(event) {
						// ⚠️超重要: ページが勝手にリロード（再読み込み）されるのを防ぐ設定
						event.preventDefault();

						let text = document.getElementById('text').value;
						if (!text.trim()) return alert("コードを入力してください");
						
						// Node.jsサーバーへ投稿データを送信（保存）
						await fetch('/post', {
								method: 'POST',
								headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
								body: `message=${encodeURIComponent(text)}`
						});

						// 入力欄を空にする
						document.getElementById('text').value = '';
						
						// グレーの枠内（#html）の投稿一覧を更新
						loadPosts();
				});

				// ページを開いた瞬間に、自動で過去の投稿を読み込む
				loadPosts();
		</script>
</body>
</html>
